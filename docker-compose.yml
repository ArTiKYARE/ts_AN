# ==========================================
# Docker Compose для AnimeStream
# ==========================================
version: '3.8'

services:
  # ------------------------------------------
  # База данных PostgreSQL
  # ------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: anime_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - anime_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Кэш Redis
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: anime_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - anime_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------
  # Backend API (NestJS)
  # ------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: anime_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      ANIME_API_KEY: ${ANIME_API_KEY}
      ANIME_API_URL: ${ANIME_API_URL}
      EXTERNAL_API_TIMEOUT: ${EXTERNAL_API_TIMEOUT}
      EXTERNAL_CACHE_TTL: ${EXTERNAL_CACHE_TTL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    networks:
      - anime_network
    command: >
      sh -c "npm run prisma:migrate && npm run prisma:seed && npm run start:prod"

  # ------------------------------------------
  # Frontend (Next.js)
  # ------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_URL}
    container_name: anime_web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - anime_network

  # ------------------------------------------
  # Admin Panel (Next.js)
  # ------------------------------------------
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${API_URL}
    container_name: anime_admin
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${API_URL}
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    depends_on:
      - api
    networks:
      - anime_network

networks:
  anime_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
