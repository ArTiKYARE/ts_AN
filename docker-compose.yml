services:
  db:
    image: postgres:15-alpine
    container_name: animestream_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-animestream}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-animestream_pass}
      POSTGRES_DB: ${DB_NAME:-animestream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-animestream}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - animestream_network

  redis:
    image: redis:7-alpine
    container_name: animestream_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - animestream_network

  api:
    build:
      context: ./animestream
      dockerfile: apps/api/Dockerfile
    container_name: animestream_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-animestream}:${DB_PASSWORD:-animestream_pass}@db:5432/${DB_NAME:-animestream}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PORT: 3001
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    networks:
      - animestream_network

volumes:
  postgres_data:
  redis_data:

networks:
  animestream_network:
    driver: bridge
